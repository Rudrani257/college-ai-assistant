{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
    <h2>📊 Update Attendance</h2>

    <form method="POST">
        <label>Total Classes</label><br>
        <input name="total_classes" value="{{ student.attendance.total_classes if student.attendance else 0 }}"><br><br>

        <label>Attended Classes</label><br>
        <input name="attended" value="{{ student.attendance.attended if student.attendance else 0 }}"><br><br>

        <button type="submit">Update Attendance</button>
    </form>
</div>

{% endblock %}
