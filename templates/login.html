{% extends "base.html" %}
{% block title %}Login – BCOE{% endblock %}
{% block content %}

<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-circle">R</div>
            <h2 style="font-size:1.3rem;font-weight:800;color:#1e293b">BCOE Portal Login</h2>
            <p style="color:#64748b;font-size:0.85rem">Bharat College of Engineering</p>
        </div>

        <!-- Tab Switcher -->
        <div class="tab-switcher">
            <button class="tab-btn active" id="tab-student" onclick="switchTab('student')">🎓 Student</button>
            <button class="tab-btn" id="tab-admin" onclick="switchTab('admin')">⚡ Admin</button>
        </div>

        <form method="POST" action="{{ url_for('main.login') }}">
            <input type="hidden" name="user_type" id="user_type" value="student">

            <div class="form-group">
                <label class="form-label" id="id-label">🎓 Student ID</label>
                <input type="text" name="user_id" class="form-control" id="user_id_input"
                       placeholder="e.g. STU001" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label">🔒 Password</label>
                <div style="position:relative">
                    <input type="password" name="password" class="form-control" id="password_input"
                           placeholder="Enter your password" required>
                    <button type="button" onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px" id="pass-eye">👁</button>
                </div>
            </div>

            <button type="submit" class="btn btn-blue w-full" style="justify-content:center;padding:12px">
                Sign In →
            </button>
        </form>

        <div style="margin-top:20px;padding:14px;background:#f8fafc;border-radius:10px;font-size:0.8rem;color:#64748b">
            <strong>Demo Credentials:</strong><br>
            🎓 Student: <code>STU001</code> / <code>student123</code><br>
            ⚡ Admin: <code>ADMIN001</code> / <code>admin123</code>
        </div>
    </div>
</div>

<script>
function switchTab(type) {
    document.getElementById('user_type').value = type;
    document.getElementById('tab-student').classList.toggle('active', type === 'student');
    document.getElementById('tab-admin').classList.toggle('active', type === 'admin');
    document.getElementById('id-label').textContent = type === 'admin' ? '⚡ Admin ID' : '🎓 Student ID';
    document.getElementById('user_id_input').placeholder = type === 'admin' ? 'e.g. ADMIN001' : 'e.g. STU001';
}

function togglePass() {
    const inp = document.getElementById('password_input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

// Pre-select tab from URL param
const urlType = new URLSearchParams(window.location.search).get('type');
if (urlType === 'admin') switchTab('admin');
</script>
{% endblock %}
